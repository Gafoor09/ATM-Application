<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ATM AppY</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .icon {
            width: 52px;
            height: 52px;
            background: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 22px;
        }

        h1 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: #1a73e8;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 22px;
            transition: opacity 0.15s;
        }

        .btn:hover { opacity: 0.88; }

        .login-link {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: #888;
        }

        .login-link a {
            color: #1a73e8;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon">👤</div>
            <h1>Create Account</h1>
            <p class="subtitle">Register to use ATM AppY</p>
        </div>

        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required />
            </div>

            <div class="form-group">
                <label for="userpinno">PIN Number</label>
                <input type="password" id="userpinno" name="userpinno" placeholder="Enter PIN" maxlength="6" required />
            </div>

            <button type="submit" class="btn">Register</button>
        </form>

        <p class="login-link">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
</body>
</html>
