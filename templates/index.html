<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM APPLICATION</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
            padding: 48px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .icon {
            width: 60px;
            height: 60px;
            background: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: #fff;
        }

        h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 6px;
        }

        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 32px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            margin-bottom: 12px;
            border: none;
            transition: opacity 0.15s;
        }

        .btn:hover { opacity: 0.88; }

        .btn-primary {
            background: #1a73e8;
            color: #fff;
        }

        .btn-secondary {
            background: #fff;
            color: #1a73e8;
            border: 1.5px solid #1a73e8;
        }

        .footer {
            margin-top: 28px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🏧</div>
        <h1>ATM APPLICATION</h1>
        <p>Welcome! Please register or log in to continue.</p>

        <a href="{{ url_for('register') }}" class="btn btn-primary">Register</a>
        <a href="{{ url_for('login') }}" class="btn btn-secondary">Login</a>

        <div class="footer">Secure &nbsp;·&nbsp; 24/7 Service</div>
    </div>
</body>
</html>
