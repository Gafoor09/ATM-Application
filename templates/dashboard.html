<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        /* Navbar */
        .navbar {
            background-color: #2c3e50;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            margin: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: #1abc9c;
        }

        /* User section */
        .user-section {
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background-color: #e74c3c;
            border: none;
            padding: 8px 15px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        /* Main content */
        .content {
            text-align: center;
            margin-top: 80px;
        }

        .content h1 {
            color: #2c3e50;
        }

        .content p {
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">

        <h2>My Dashboard</h2>

        <!-- Navigation Links -->
        <div class="nav-links">
            <a href="{{ url_for('withdraw') }}">Withdraw</a>
            <a href="{{ url_for('deposit') }}">Deposit</a>
            <a href="{{ url_for('balance') }}">Balance</a>
        </div>

        <!-- User + Logout -->
        <div class="user-section">
            <span>Welcome, {{ request.cookies.get('user') }}</span>

            <form action="{{ url_for('logout') }}" method="GET">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>

    </div>

    <!-- Main Section -->
    <div class="content">
        <h1>Welcome to ATM Dashboard</h1>
        <p>Select any option from the navigation bar to continue.</p>
    </div>

</body>
</html>
